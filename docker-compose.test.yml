services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  app:
    image: ghcr.io/vld555/containers-lab-1/app:latest
    environment:
      DB_HOST: postgres
      DB_PASSWORD: secret
      DB_NAME: myapp_test
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - test-network

  nginx:
    image: ghcr.io/vld555/containers-lab-1/nginx:latest
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - test-network

networks:
  test-network: